<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet"href="/style.css">
    
</head>
<body>
    
    <div id="calc">
        <h1>Welcome to Calculate me!</h1>
        <input type="text"placeholder="Enter number">
        
            <div class="row1">
                <button>^</button>
                <button>&#960</button>
                <button>&#8730</button>
                <button class="back">⌫</button>
            </div>
            <div class="row2">
                <button>C</button>
                <button>()</button>
                <button>%</button>
                <button class="operators"value="/">&divide</button>
            <div class="row3">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operators">*</button>
             </div>
            <div class="row4">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operators">-</button>
            </div>
            <div class="row5">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operators">+</button>
            </div>
            <div class="row6">
                <button>+/-</button>
            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>
            </div>
        
    </div>
    <script src="script.js"></script>
    
    

</body>
</html>
